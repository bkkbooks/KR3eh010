body:
  text: 卷上一元氣虧損內傷外感等症車駕王用之卒中昏憒口眼喎斜痰氣上湧咽喉有聲六脈沉伏此真氣虛而風邪所乘以三生飲一兩加人參一兩煎服即蘇若遺尿手撒口開鼾睡為不治用前藥亦有得生者夫前飲乃行經絡治寒痰之藥有斬關奪旗之功每服必用人參兩許駕驅其邪而補助真氣否則無益適足以取敗矣觀先哲用耆附參附等湯其義可見州判蔣大用形體魁偉中滿吐痰勞則頭暈所服皆清痰理氣余曰中滿者脾氣虧損也痰盛者脾氣不能運也頭暈者脾氣不能升也指麻者脾氣不能周也遂以補中益氣加茯苓半夏以補脾土用八味地黃以補土母而愈後惑於乾坤生意方云凡人手指麻軟三年後有中風之疾可服搜風天麻二丸以預防之乃朝餌暮服以致大便不禁飲食不進而歿愚謂預防之理當養氣血節飲食戒七情遠幃幕可也若服前丸以預防適所以招風取中也一男子卒中口眼喎斜不能言語遇風寒四肢拘急脈浮而緊此手足陽明經虛風寒所乘用秦艽升麻湯治之稍愈乃以補中益氣加山梔而痊若舌喑不能言足痿不能行屬腎氣虛弱名曰痱症宜用地黃飲子治之然此症皆由將息失宜腎水不足而心火暴盛痰滯於胸也輕者自蘇重者或死一男子體肥善飲舌本硬強語言不清口眼喎斜痰氣湧盛肢體不遂余以為脾虛濕熱用六君加煨葛根山梔神麯而痊吾師僉憲高如齋自大同回謂余曰吾成風病矣兩腿逸則痿軟而無力勞則作痛如針刺脈洪數而有力余告之曰此肝腎陰虛火盛而致痿軟無力真病之形作痛如錐邪火之象也用壯水益腎之劑而愈先生曰向寓宦邸皆以為風恨無醫藥若服風劑豈其然哉乃吾之幸也竊謂前症往往以為風疾徹用發散而促其危者多矣大尹劉孟春素有痰兩臂作麻兩目流淚服祛風化痰藥痰愈甚臂反痛不能伸手指俱攣余曰麻屬氣盛因前藥而復傷肝火盛而筋攣耳況風自火出當補脾肺滋腎水則風自息熱自退痰自清遂用六味地黃丸補中益氣湯不三月而痊一儒者素勤苦惡風寒鼻塞流清涕寒禁嚏噴余曰此脾肺氣虛不能實腠理彼不信服祛風之藥肢體麻倦痰涎自出殊類中風余曰此因風劑耗散元氣陰火乘其土位遂以補中益氣加麥門五味治之而愈外舅年六十餘素善飲兩臂作痛恪服祛風治痿之藥更加麻木發熱體軟痰湧腿膝拘痛口噤語澀頭目暈重口角流涎身如蟲行搔起白屑始信謂余曰何也余曰臂麻體軟脾無用也痰涎自出脾不能攝也口斜語澀脾氣傷也頭目暈重脾氣不能升也癢起白屑脾氣不能營也遂用補中益氣加神麯半夏茯苓三十餘劑諸症悉退又用參朮煎膏治之而愈秀才劉允功形體魁偉不慎酒色因勞怒頭暈仆地痰涎上湧手足麻痹口乾引飲六脈洪數而虛余以為腎經虧損不能納氣歸源而頭暈不能攝水歸源而為痰陽氣虛熱而麻痹虛火上炎而作渴用補中益氣合六味丸料治之而愈其後或勞役或入房其病即作用前藥隨愈憲幕顧斐齋飲食起居失宜左半身並乎不遂汗出神昏痰涎上湧王竹西用參耆大補之劑汗止而神思漸清頗能步履後不守禁左腿自膝至足腫脹甚大重墜如石痛不能忍其痰甚多肝脾腎脈洪大而數重按則軟澀余朝用補中益氣加黃柏知母麥門五味煎送地黃丸晚用地黃丸料加黃柏知母數劑諸症悉退但自弛禁不能痊愈耳庠生陳時用素勤苦因勞怒口斜痰盛脈滑數而虛此勞傷中氣怒動肝火用補中益氣加山梔茯苓半夏桔梗數劑而愈錦衣楊永興形體豐厚筋骨軟痛痰盛作渴喜飲冷水或用愈風湯天麻丸等藥痰熱益甚服牛黃清心丸更加肢體麻痹余以為脾腎俱虛用補中益氣湯加減八味丸三月餘而痊以後連生七子壽逾七旬外科精要云凡人久服加減八味丸必肥健而多子信哉先母七十有五遍身作痛筋骨尤甚不能伸屈口乾目赤頭暈痰壅胸膈不利小便短赤夜間殊甚遍身作癢如蟲行用六味地黃丸料加山梔柴胡治之諸症悉愈一男子時瘡愈後遍身作痛服愈風丹半身不遂痰涎上湧夜間痛甚余作風客淫氣治以地黃丸而愈一老人兩臂不遂語言蹇澀服祛風之藥筋攣骨痛此風藥虧損肝血益增其病也余用八珍湯補其氣血用地黃丸補其腎水佐以愈風丹而愈一婦人因怒吐痰胸滿作痛服四物二陳芩連枳殼之類不應更加祛風之劑半身不遂筋漸攣縮四肢痿軟日晡益甚內熱口乾形體倦怠余以為鬱怒傷脾肝氣血復損而然遂用逍遙散補中益氣湯六味地黃丸調治喜其謹疾年餘悉愈形體康健一婦人脾胃虛弱飲食素少忽痰湧氣喘頭搖目札手揚足擲難以候脈視其面色黃中見青此肝木乘脾土用六君加柴胡升麻治之而蘇更以補中益氣加半夏調理而痊一婦人懷抱鬱結筋攣骨痛喉間似有一核服烏藥順氣散等藥口眼歪斜臂難伸舉痰涎愈甚內熱晡熱食少體倦余以為鬱火傷脾血燥生風所致用加味歸脾湯二十餘劑形體漸健飲食漸加又服加味逍遙散十餘劑痰熱少退喉核少利更用升陽益胃湯數劑諸症漸愈但臂不能伸此肝經血少用地黃丸而愈一產婦筋攣臂軟肌肉掣動此氣血俱虛而有熱用十全大補湯而痊其後因怒而復作用加味逍遙散而愈一產婦兩手麻木服愈風丹天麻丸遍身皆麻神思倦怠晡熱作渴自汗盜汗此氣血俱虛用十全大補加炮姜數劑諸症悉退卻去炮姜又數劑而愈但有內熱用加味逍遙散數劑而痊一男子善飲舌本強硬語言不清余曰此脾虛濕熱當用補中益氣加神麯麥芽乾葛澤瀉治之一婦人善怒舌本強手臂麻余曰舌本屬土被木剋制故耳當用六君加柴胡芍藥治之一男子舌下牽強手大指次指不仁或大便秘結或皮膚赤暈余曰大腸之脈散舌下此大腸血虛風熱當用逍遙散加槐角秦艽治之一男子足痿軟日晡熱余曰此足三陰虛當用六味滋腎二丸補之一婦人腿足無力勞則倦怠余曰四肢者土也此屬脾虛當用補中益氣及還少丹主之俱不從余言各執搜風天麻二丸並愈風丹而殞二飲食勞倦虧損元氣等症進士王汝和因勞役失於調養忽然昏憒此元氣虛火妄動挾痰而作急令灌童便神思漸爽更用參耆各五錢芎歸各三錢玄參柴胡山梔炙草各一錢服之稍定察其形倦甚又以十全大補湯加五味麥門治之而安凡人元氣素弱或因起居失宜或因飲食勞倦或因用心太過致遺精白濁自汗盜汗或內熱晡熱潮熱發熱或口乾作渴喉痛舌裂或胸乳膨脹脅肋作痛或頭頸肘痛眩暈目花或心神不寧寤而不寐或小便赤澀莖中作痛或便溺余滴臍腹陰冷或形容不充肢體畏寒或鼻氣急促或更有一切熱症皆是無根虛火但服前湯固其根本諸症自息若攻其風熱則誤矣光祿高署丞脾胃素虛因飲食勞倦腹痛胸痞誤用大黃等藥下之譫語煩躁頭痛喘汗吐瀉頻頻時或昏憒脈大而無倫次用六君子加炮姜四劑而安但倦怠少食口乾發熱六脈浮數欲用瀉火之藥余曰不時發熱是無火也脈浮大是血虛也脈虛浮是氣虛也此因胃虛五臟虧損虛症發見服補胃之劑諸症悉退大尹徐克明因飲食失宜日晡發熱口乾體倦小便赤澀兩腿痠痛余用補中益氣湯治之彼知醫自用四物黃柏知母之劑反頭眩目赤耳鳴唇燥寒熱痰湧大便熱痛小便赤澀又用四物芩連枳實之類胸膈痞滿飲食少思汗出如水再用二陳芩連黃柏知母麥門五味言語譫妄兩手舉拂屢治反甚復求余用參耆各五錢歸術各三錢遠志茯神酸棗仁炙草各一錢服之熟睡良久四劑稍安又用八珍湯調補而愈夫陰虛乃脾虛也脾為至陰因脾虛而致前症蓋脾稟於胃故用甘溫之劑以生髮胃中元氣而除大熱胡乃反用苦寒復傷脾血耶若前症果屬腎經陰虛亦因腎經陽虛不能生陰耳經云無陽則陰無以生無陰則陽無以化又云虛則補其母當用補中益氣六味地黃以補其母尤不宜用苦寒之藥世以脾虛誤為腎虛輒用黃柏知母之類反傷胃中生氣害人多矣大凡足三陰虛多因飲食勞役以致腎不能生肝肝不能生火而害脾土不能滋化但補脾土則金旺水生木得平而自相生矣一男子每遇勞役食少胸痞發熱頭痛吐痰作渴脈浮大余曰此脾胃血虛病也脾屬土為至陰而生血故曰陰虛彼不信服二陳黃連枳實厚朴之類諸症益甚又服四物黃柏知母麥門更腹痛作嘔脈洪數而無倫次余先用六君加炮姜痛嘔漸愈又用補中益氣痊愈秀才劉貫卿勞役失宜飲食失節肢體倦怠發熱作渴頭痛惡寒誤用人參敗毒散痰喘昏憒揚手擲足胸間發斑如蚊所吶余用補中益氣加薑桂麥門五味補之而愈黃武選飲食勞倦發熱惡寒或用解表之藥益甚再劑昏憒胸發黑斑脈洪數而無力余欲用補中益氣之劑不從而歿一儒者素勤苦因飲食失節大便下血或赤或黯半載之後非便血則盜汗非惡寒則發熱血汗二藥用之無效六脈浮大心脾則澀此思傷心脾不能攝血歸源然血即汗汗即血其色赤黯便血盜汗皆火之升降微甚耳惡寒發熱氣血俱虛也乃午前用歸脾加麥門五味以補心脾之血收耗散之液不兩月而諸症悉愈癸卯春人日余在下堡顧氏會間有儒者許梅村云余親馬生者發熱煩渴時或頭痛昨服發散藥反加喘急腹痛其汗如水晝夜譫語余意此勞傷元氣誤汗所致其腹必喜手按許往詢之果然遂與十全大補加附子一錢服之熟睡喚而不醒舉家驚惶及覺諸症頓退再劑而痊凡人飲食勞役起居失宜見一切火症悉屬內真寒而外假熱故肚腹喜暖口畏冷物此乃形氣病氣俱屬不足法當純補元氣為善一儒者日晡兩目緊澀不能瞻視此元氣下陷用補中益氣倍加參耆數劑痊愈一男子患症同前服黃柏知母之類目疾益甚更加便血此脾氣虛不能統血肝氣虛不能藏血用補中益氣六味地黃以補肝脾生腎水諸症漸愈一男子飲食勞倦而發寒熱右手麻木或誤以為疔毒敷服皆寒涼敗毒腫脹重墜面色痿黃肢體倦怠六脈浮大按之如無此脾胃之氣虛也詢之果是銷銀匠因熱手入水梅銀寒凝隧道前藥益傷元氣故耳遂用補中益氣及溫和之藥煎漬湯手而愈一儒者修左足傷其大指甲少許不見血不作痛形體如故後因飲食勞倦足重墜微腫痛或晝睡或夜寐其足如故誤服敗毒之劑寒熱腫痛蓋脾起於大指此是脾氣虛弱下陷用十全大補湯而愈余素性愛坐觀書久則倦怠必服補中益氣加麥門五味酒炒黑黃柏少許方覺精神清妥否則夜間少寐足內酸熱若再良久不寐腿內亦然且兼腿內筋似有抽縮意致兩腿左右頻移展轉不安必至倦極方寐此勞傷元氣陰火乘虛下注丁酉五十一歲齒縫中有如物塞作脹不安甚則口舌有瘡然日晡益甚若睡良久或服前藥始安至辛丑時五十有五晝間齒縫中作脹服補中益氣一劑夜間得寐至壬寅有內艱之變日間雖服前劑夜間齒縫亦脹每至午前諸齒並肢體方得稍健午後仍脹觀此可知血氣日衰治法不同三脾胃虧損心腹作痛等症唐儀部胸內作痛月餘腹亦痛左關弦長右關弦緊此脾虛肝邪所乘以補中益氣加半夏木香二劑而愈又用六君子湯二劑而安此面色黃中見青儀部李北川常患腹痛每治以補中益氣加山梔即愈一日因怒肚腹作痛胸脅作脹嘔吐不食肝脈弦緊此脾氣虛弱肝火所乘仍用前湯吞左金丸一服而愈此面色黃中見青兼赤太守朱陽山因怒腹痛作瀉或兩脅作脹或胸乳作痛或寒熱往來或小便不利飲食不入嘔吐痰涎神思不清此肝木乘脾土用小柴胡加山梔炮薑茯苓陳皮制黃連一劑而愈制黃連即黃連吳茱萸等分用熱水拌濕罨二三日同炒焦取連用後仿此陽山之內素善怒胸膈不利吐痰甚多吞酸噯腐飲食少思手足發熱十餘年矣所服非芩連枳實必檳蘇厚朴左關弦洪右關弦數此屬肝火血燥木乘土位朝用六味地黃丸以滋養肝木夕用六君加當歸芍藥以調補脾土不月而愈癸卯夏患背疽症屬虛寒用大溫補之藥而愈乙巳夏因大怒吞酸噯腐胸腹脹滿余以他往旬日或用二陳石膏治之吐涎如湧外熱如灼將用滾痰丸下之余到診之脈洪大按之如無余曰此乃脾胃虧損而發熱脾弱而涎泛出也余用六君加薑桂一鍾即睡覺而諸症如失又數劑而康儒者沈尼文內停飲食外感風寒頭痛發熱噁心腹痛就治敝止余用人參養胃加芎芷曲柏香附桔梗一劑而愈次日抵家前病仍作腹痛請治以手重按痛即止此客寒乘虛而作也乃以香砂六君加木香炮姜服之睡覺痛減六七去二香再服飲食少進又加黃耆當歸少佐升麻而愈府庠徐道夫母胃脘當心痛劇右寸關俱無左雖有微而似絕手足厥冷病勢危篤察其色眼胞上下青黯此脾虛肝木所勝用參朮茯苓陳皮甘草補其中氣用木香和胃氣以行肝氣用吳茱萸散脾胃之寒止心腹之痛急與一劑俟滾先服煎熟再進諸病悉愈向使泥其痛無補法而反用攻伐之藥禍不旋踵一婦人懷抱鬱結不時心腹作痛年餘不愈諸藥不應余用歸脾加炒山梔而愈四脾腎虛寒陽氣脫陷等症譚侍御但頭痛即吐清水不拘冬夏吃薑便止已三年矣余作中氣虛寒用六君加當歸黃耆木香炮姜而瘥一儒者四時喜極熱飲食或吞酸噯腐或大便不實足指縫濕癢此脾氣虛寒下陷用六君加薑桂治之而愈稍為失宜諸疾仍作用前藥加附子錢許數劑不再發一男子形體倦怠飲食適可足指縫濕癢行坐久則重墜此脾胃氣虛而下陷用補中益氣加茯苓半夏而愈一男子食少胸滿手足逆冷飲食畏寒發熱吐痰時欲作嘔自用清氣化痰及二陳枳實之類胸腹膨脹嘔吐痰食小便淋漓又用四苓連柏知母車前小便不利諸病益甚余曰此脾胃虛寒無火之症故食入不消而反出遂用八味丸補火以生土用補中益氣加薑桂培養中宮生髮陽氣尋愈一男子每勞肢體時痛或用清痰理氣之劑不勞常痛加以導濕臂痛漫腫形體倦怠內熱盜汗脈浮大按之微細此陽氣虛寒用補中益氣加附子一錢人參五錢腫痛悉愈又以十全大補百餘劑而康彼計服過人參一十三斤薑附各斤余大雅云家母年四十有二嘉靖壬寅七月患脾虛中滿痰嗽發熱又因濕面冷茶吞酸嘔吐絕食誤服芩連青皮等藥益加寒熱口乾流涎不收且作渴聞食則嘔數日矣迎先生視之曰脾主涎此脾虛不能約制故涎自出也欲用人參安胃散惑於眾論以為胃經實火宿食治之病日增劇忽思冬瓜食如指甲一塊頓發嘔吐酸水不止仍服前藥愈劇復邀先生視之則神脫脈絕瀕死矣惟目睛尚動先生曰寒淫於內治以辛熱然藥不能下矣急用鹽附子炒熱熨臍腹以散寒回陽又以口氣補接母口之氣又以附子作餅熱貼臍間時許神氣少蘇以參朮附子為末仍以是藥加陳皮煎膏為丸如粟米大入五七粒於口隨津液嚥下即不嘔二日後加至十餘粒諸病少退甘涎不止五日後漸服煎劑一二匙胃氣少復乃思粥飲後投以參術等藥溫補脾胃五十餘劑而愈大雅敢述病狀之奇用藥之神求附卷末一以見感恩之意一以示後之患者當取法於此云爾府學晚生長洲鑊潭沈大雅頓首拜書五命門火衰不能生土等症廷評張汝翰胸膈作痞飲食難化服枳朮丸久而形體消瘦發熱口乾脈浮大而微用補中益氣加薑桂諸症悉退惟見脾胃虛寒遂用八味丸補命門火不月而飲食進三月而形體充此症若不用前丸多變腹脹喘促腿足浮腫小便淋瀝等症急用濟生加減腎氣丸亦有得生者一儒者雖盛暑喜燃火四肢常欲沸湯漬之面赤吐痰一似實火吐甚宿食亦出惟食椒姜之物方快余謂食入反出乃脾胃虛寒用八味丸及十全大補加炮姜漸愈不月平復一婦人飲食無過碗許非大便不實必吞酸噯腐或用二陳黃連更加內熱作嘔余謂東垣先生云邪熱不殺穀此脾胃虛弱末傳寒中以六君加炮薑木香數劑胃氣漸復飲食漸進又以補中益氣加炮薑木香茯苓半夏數劑痊愈後怒飲食頓少元氣頓怯更加發熱誠似實火脈洪大而虛兩尺如無用益氣湯八味丸兩月諸症悉愈佐云向因失足劃然有聲坐立久則左足麻木雖夏月足寒如冰嘉靖巳亥夏月因醉睡覺而飲水復睡遂覺右腹痞結以手摩之腹間瀝漉有聲熱摩則氣泄而止每每加劇飲食稍多則作痛瀉求治於醫令服枳朮丸固守勿效甲辰歲求治於立齋先生診之喟然嘆曰此非脾胃病乃命門火衰不能生土土虛寒使之然也若專主脾胃誤矣可服八味丸則愈予亦敬服果驗蓋八味丸有附子醫家罔敢輕用夫附子斬關奪旗回生起死非良將莫能用立齋先生今之武侯也家貧不能報德故序此以記治驗嘉靖甲辰十二月望後二日杉墩介庵朱佐頓首拜書光祿鄺子涇面白神勞食少難化所服皆二陳山梔枳實之類形體日瘦飲食日減余謂此脾土虛寒之症法當補土之母彼不信乃徑補土以致不起羅工部仲夏腹惡寒而外惡熱鼻吸氣而腹覺冷體畏風而惡寒脈大而虛微每次進熱粥甌許必兼食生薑甌許離火食腹內即冷余曰熱之不熱是無火也當用八味丸壯火之源以消陰翳彼反服四物玄參之類而歿工部陳禪亭發熱有痰服二陳黃連枳殼之類病益甚甲辰季冬請治其脈左尺微細右關浮大重按微弱余曰此命門火衰不能生土而脾病當補火以生土或可愈也不悟仍服前藥脾土愈弱至乙巳閏正月病已革復邀治右寸脈平脫此土不能生金生氣絕於內矣辭不治經云虛則補其母實則瀉其子凡病在子當補其母況病在母而屬不足反瀉其子不死何俟辛丑年余在嘉興屠漸山第有林二守不時昏憒請余治之譫語不絕脈洪大按之如無此陽虛之症也當用參附湯治之有原醫者揚喜而迎曰先得我心之同然遂服之即靜睡覺而進食午後再劑神思如故其脈頓斂余返後又詐云用附子多矣吾以黃連解之陰仍用參附湯竊觀仲景先生治傷寒云桂枝下咽陽盛乃斃硝黃入胃陰盛乃亡不辨而自明矣吾恐前言致誤患者故表而出之六腎虛火不歸經發熱等症大尹沈用之不時發熱日飲冰水數碗寒藥二劑熱渴益甚形體日瘦尺脈洪大而數時或無力王太僕曰熱之不熱責其無火寒之不寒責其無水又云倏熱往來是無火也時作時止是無水也法當補腎用加減八味丸不月而愈通安橋顧大有父年七十有九仲冬將出少妾入房致頭痛發熱眩暈喘急痰涎壅盛小便頻數口乾引飲遍舌生刺縮斂如荔枝然下唇黑裂面目俱赤煩躁不寐或時喉間如煙火上衝急飲涼茶少解已濱於死脈洪大而無倫且有力捫其身烙手此腎經虛火遊行於外投以十全大補加山茱澤瀉丹皮山藥麥門五味附子一鍾熟寐良久脈症各減三四再與八味丸服之諸症悉退後畏冷物而痊下堡顧仁成年六十有一痢後入房精滑自遺二日方止又房勞感寒怒氣遂發寒熱右脅痛連心胸腹痞自汗盜汗如雨四肢厥冷睡中驚悸或覺上升如浮或覺下陷如墮遂致廢寢或用補藥二劑益甚脈浮大洪數按之微細此屬無火虛熱急與十全大補加山藥山茱丹皮附子一劑諸症頓愈而痊此等元氣百無一二二顧是父子也一儒者口乾發熱小便頻濁大便秘結盜汗夢遺遂致廢寢用當歸六黃湯二劑盜汗頓止用六味地黃丸二便調和用十全大補湯及前丸兼服月餘悉愈州同韓用之年四十有六時仲夏色欲過度煩熱作渴飲水不絕小便淋瀝大便秘結唾痰如湧面目俱赤滿舌生刺兩唇燥裂遍身發熱或時如芒刺而無定處兩足心如烙以冰折之作痛脈洪而無倫此腎陰虛陽無所附而發於外非火也蓋大熱而甚寒之不寒是無水也當峻補其陰遂以加減八味丸料一斤內肉桂一兩以水頓煎六碗冰冷與飲半餉已用大半睡覺而食溫粥一碗復睡至晚乃以前藥溫飲一碗乃睡至曉食熱粥二碗諸症悉退翌日畏寒足冷至膝諸症仍至或以為傷寒余曰非也大寒而甚熱之不熱是無火也陽氣亦虛矣急以八味丸一劑服之稍緩四劑諸症復退大便至十三日不通以豬膽導之諸症復作急用十全大補湯數劑方應舉人陳履賢色欲過度丁酉孟冬發熱無時飲水不絕遺精不止小便淋瀝或用四物芩連之類前症益甚更加痰涎上湧口舌生瘡服二陳黃柏知母之類胸膈不利飲食少思更加枳殼香附肚腹作脹大便不實脈浮大按之微細余朝用四君為主佐以熟地當歸夕用加減八味丸更以附子唾津調搽湧泉穴漸愈後用十全大補湯其大便不通小腹作脹此直腸乾澀令豬膽通之形體殊倦痰熱頓增急用獨參湯而安再用前藥而愈但勞發熱無時其脈浮洪余謂其當慎起居否則難治彼以余言為迂至乙巳夏復作乃服四物黃柏知母而歿吳江晚生沈察頓首云云僕年二十有六所稟虛弱兼之勞心癸巳春發熱吐痰甲午冬為甚其熱時起於小腹吐痰而無定時治者謂脾經濕痰鬱火用芩連枳實二陳或專主心火用三黃丸之類至乙未冬其熱多起足心亦無定時吐痰不絕或遍身如芒刺然治者又以為陰火生痰用四物二陳黃柏知母之類俱無驗丙申夏痰熱愈甚盜汗作渴果屬痰火耶陰虛耶乞高明裁示云云余曰此症乃腎經虧損火不歸經當壯水之主以鎮陽光乃就診於余果尺脈洪大余卻虛浮遂用補中益氣及六味地黃而愈後不守禁其脈復作余謂火令可憂當慎調攝會試且緩但彼忽略至戊戌夏果歿於京七脾胃虧損吞酸噯腐等症大司馬王浚川嘔吐宿滯臍腹痛甚手足俱冷脈微細用附子理中丸一服益甚脈浮大按之而細用參附湯一劑頓愈趙吏部文卿患吐不止吐出皆酸味氣口脈大於人迎二三倍速予投劑予曰此食鬱上宜吐不須用藥乃候其吐清水無酸氣寸脈漸減足脈漸復翌早吐止至午脈俱平復勿藥自安後撫陝右過蘇顧訪傾蓋清談厚過於昔且念余在林下頻以言慰之一儒者面色痿黃胸膈不利吞酸噯腐恪服理氣化痰之藥大便不實食少體倦此脾胃虛寒用六君加炮薑木香漸愈兼用四神丸而元氣復此症若中氣虛弱者用人參理中湯或補中益氣加木香乾薑不應送左金丸或越鞠丸若中氣虛寒必加附子或附子理中湯無有不愈一上舍飲食失宜胸腹膨脹噯氣吞酸以自知醫用二陳枳實黃連蒼朮黃柏之類前症益甚更加足趾腫痛趾縫出水余用補中益氣加茯苓半夏治之而愈若腿足浮腫或焮腫寒熱嘔吐亦用前藥儒者胡濟之場屋不利胸膈膨悶飲食無味服枳朮丸不時作嘔用二陳黃連枳實痰湧氣促加紫蘇枳殼喘嗽腹脹加厚朴腹皮小便不利加檳榔莪朮泄瀉腹痛悉屬虛寒用六君加薑桂二劑不應更加附子一錢二劑稍退數劑十愈六七乃以八味丸痊愈一上舍嘔吐痰涎發熱作渴胸膈痞滿或用清氣化痰降火前症益甚痰涎自出余曰嘔吐痰涎胃氣虛寒發熱作渴胃不生津胸膈痞滿脾氣虛弱須用參耆歸術之類溫補脾胃生髮陽氣諸病自退彼不信仍服前藥虛症悉至復請治余曰飲食不入吃逆不絕泄瀉腹痛手足逆冷是謂五虛煩熱作渴虛陽越於外也脈洪大脈欲絕也死期迫矣或曰若然殞於日乎夜乎余曰脈洪大當殞於晝果然余母太宜人年六十有五己卯春二月飲食後偶聞外言忤意嘔吐酸水內熱作渴飲食不進惟飲冷水氣口脈大而無倫面色青赤此胃中濕熱鬱火投之以藥入口即吐第三日吐酸物第七日吐酸黃水十一日吐苦水脈益洪大仍喜冷水以黃連一味煎湯冷飲少許至二十日加白朮白茯苓至二十五日加陳皮三十七日加當歸炙甘草至六十日始進清米飲半盞漸進薄粥調理得痊一婦人吞酸噯腐嘔吐痰涎面色純白或用二陳黃連枳實之類加發熱作渴肚腹脹滿余曰此脾胃虧損末傳寒中不信仍作火治肢體腫脹如蠱余以六君加附子木香治之胃氣漸醒飲食漸進虛火歸經又以補中益氣加炮薑木香茯苓半夏兼服痊愈一婦人性沉靜多慮胸膈不利飲食少思腹脹吞酸面色青黃用疏利之劑余曰此脾虛痞滿當益胃氣不信仍用之胸膈果滿飲食愈少余以調中益氣加香砂炮姜漸愈後以六君芎歸貝母桔梗炮姜而愈伷云家母久患心腹疼痛每作必胸滿嘔吐厥逆面赤唇麻咽乾舌燥寒熱不時而脈洪大眾以痰火治之屢止屢作迨乙巳春發熱頻甚用藥反劇有朱存默氏謂服寒涼藥所致欲用參術等劑余疑痛無補法乃請立齋先生以折中焉先生診而嘆曰此寒涼損真之故內真寒而外假熱也且脈息弦洪而有怪狀乃脾氣虧損肝脈乘之而然惟當溫補其胃遂與補中益氣加半夏茯苓吳茱木香一服而效家母病發月餘竟夕不安今熟寐徹曉洪脈頓斂怪脈頓除諸症釋然先生之見蓋有本歟家母余齡皆先生所賜杏林報德沒齒不忘謹述此乞附醫案諒有太史者採入倉公諸篇以垂不朽將使後者觀省焉嘉靖乙巳春月吉日陳湖眷生陸伷頓首謹書一婦人年三十餘忽不進飲食日飲清茶三五碗並少用水果三年餘矣經行每次過期而少余以為脾氣鬱結用歸脾加吳茱不數劑而飲食如常若人脾腎虛而不飲食當以四神丸治之一婦人年逾二十不進飲食二年矣日飲清茶果品之類面部微黃浮腫形體如常仍能步履但體倦怠肝脾二脈弦浮按之微而結滯余用六君加木香吳茱下痰積甚多飲食頓進形體如瘦臥床月餘仍服六君之類而安婦人患此見女科撮要八脾腎虧損停食泄瀉等症進士劉華甫停食腹痛瀉黃吐痰服二陳山梔黃連枳實之類其症益甚左關弦緊右關弦長乃肝木克脾土用六君加木香治之而愈若食已消而泄未已宜用異功散以補脾胃如不應用補中益氣升發陽氣凡泄利色黃脾土虧損真氣下陷必用前湯加木香肉蔻溫補如不應當補其母宜八味丸光祿柴黼庵善飲泄瀉腹脹吐痰作嘔口乾此脾胃之氣虛先用六君加神麯痰嘔已止再用補中益氣加茯苓半夏瀉脹亦愈此症若濕熱壅滯當用葛花解酲湯分消其濕濕既去而瀉未已須用六君加神麯實脾土化酒積然雖為酒而作實因脾土虛弱不可專主濕熱舊僚錢可久素善飲面赤痰盛大便不實此腸胃濕痰壅滯用二陳芩連山梔枳實乾葛澤瀉升麻一劑痰吐甚多大便始實此後日以黃連三錢泡湯飲之而安但如此稟厚者不多耳一儒者善飲便滑溺澀食減胸滿腿足漸腫症屬脾腎虛寒用加減金匱腎氣丸食進腫消更用八味丸胃強脾健而愈一男子侵晨或五更吐痰或有酸味此是脾氣虛弱用六君送四神丸而愈若脾氣鬱滯用二陳加桔梗山梔送香連丸若鬱結傷脾用歸脾湯送香連丸若胸膈不舒歸脾加柴胡山梔送左金丸若胃氣虛津液不能運化用補中益氣送左金丸一羽士停食泄瀉自用四苓黃連枳實曲柏益甚余曰此脾腎泄也當用六君加薑桂送四神丸不信又用沉香化氣丸一服臥床不食咳則糞出幾至危殆終踐余言而愈蓋化氣之劑峻厲猛烈無經不傷無臟不損豈宜輕服嘉靖乙未紹患肝克脾面赤生風大腸燥結炎火衝上久之遂致臟毒下血腸鳴溏泄腹脹喘急馴至絕谷瀕於殆矣諸醫方以枳實黃連之劑投之展轉增劇乃求於立齋先生先生曰爾病脾腎兩虛內真寒而外虛熱法當溫補遂以參術為君山藥黃耆肉果薑附為臣茱萸骨脂五味歸苓為佐治十劑俾以次服之諸醫皆曰此火病也以火濟火可乎紹雅信先生不為動服之浹旬盡劑而血止諸疾遄已先是三年前先生過紹謂曰爾面部赤風脾胃病也不治將深予心憂之而怠緩以須疾發又惑於眾論幾至不救微先生吾其土矣嗚呼先生之術亦神矣哉紹無以報盛德敬述梗概求附案末以為四方抱患者告庶用垂惠於無窮云長洲朱紹九脾胃虧損停食痢疾等症崔司空年逾六旬患痢赤白裡急後重此濕熱壅滯用芍藥湯內加大黃二錢一劑減半又劑痊愈惟急重未止此脾氣下陷用補中益氣送香連丸而愈羅給事小腹急痛大便欲去不去此脾腎氣虛而下陷也用補中益氣送八味丸二劑而愈此等症候因痢藥致損元氣肢體腫脹而歿者不可枚舉少宗伯顧東江停食患痢腹痛下墜或用疏導之劑兩足脹腫食少體倦煩熱作渴脈洪數按之微細余以六君加薑桂各二錢吳茱五味各一錢煎熟冷服之即睡覺而諸症頓退再劑全退此假熱而治以假寒也太常邊華泉嘔吐不食腹痛後重自用大黃等藥一劑腹痛益甚自汗發熱昏憒脈大余用參術各一兩炙甘草炮姜各三錢升麻一錢一鍾而蘇又用補中益氣加炮姜二劑而愈廷評曲汝為食後入房翌午腹痛去後似痢非痢次日下皆膿血煩熱作渴神思昏倦用四神丸一服頓減又用八味丸料加五味吳茱骨脂肉蔻二劑痊愈判官汪天錫年六十餘患痢腹痛後重熱渴引冷飲食不進用芍藥湯內加大黃一兩四劑稍應仍用前藥大黃減半數劑而愈此等元氣百無一二通府薛允頫下血服犀角地黃湯等藥其血愈多形體消瘦發熱少食裡急後重此脾氣下陷余用補中益氣加炮姜一劑而愈一上舍患痢後重自知醫用芍藥湯後重益甚飲食少思腹寒肢冷余以為脾胃虧損用六君加木香炮姜二劑而愈一老人素以酒乳同飲去後似痢非痢胸膈不寬用痰痢等藥不效余思本草云酒不與乳同飲為得酸則凝結得苦則行散遂以茶茗為丸時用清茶送三五十丸不數服而瘥一老婦食後因怒患痢裡急後重屬脾氣下陷與大劑六君加附子肉蔻煨木香各一錢吳茱五分骨脂五味各一錢五分二劑諸症悉退惟小腹脹悶此肝氣滯於脾也與調中益氣加附子木香五分四劑而愈後口內覺咸此腎虛水泛與六味地黃丸二劑頓愈先母年八十仲夏患痢腹痛作嘔不食熱渴引湯手按腹痛稍止脈鼓指而有力真氣虛而邪氣實也急用人參五錢白朮茯苓各三錢陳皮升麻附子炙甘草各一錢服之睡覺索食脈症頓退再劑而安此取症不取脈也凡暴病毋論其脈當從其症時石閣老太夫人其年歲脈症皆同彼乃專治其痢遂致不起橫金陳梓園年六十面帶赤色吐痰口乾或時作瀉癸卯春就診謂余曰僕之症或以為脾經濕熱痰火作瀉率用二陳黃連枳實神麯麥芽白朮柴胡之類不應何也餘脈之左關弦緊腎水不能生肝木也右關弦大肝木乘克脾土也此乃脾腎虧損不能生剋制化當滋化源不信余謂其甥朱太守陽山曰令舅不久當殞於痢至甲辰夏果患痢而歿產後痢疾見女科撮要十脾胃虧損瘧疾寒熱等症冬官朱省庵停食感寒而患瘧自用清脾截瘧二藥食後腹脹時或作痛服二陳黃連枳實之類小腹重墜腿足浮腫加白朮山楂吐食未化謂余曰何也余曰食後脹痛乃脾虛不能克化也小腹重墜乃脾虛不能升舉也腿足浮腫乃脾虛不能運行也吐食不消乃脾胃虛寒無火也治以補中益氣加吳茱炮薑木香肉桂一劑諸症頓退飲食頓加不數劑而痊大凡停食之症宜用六君枳實厚朴若食已消而不愈用六君子湯若內傷外感用藿香正氣散若內傷多而外感少用人參養胃湯若勞傷元氣兼外感用補中益氣加川芎若勞傷元氣兼停食補中益氣加神麯陳皮若氣惱兼食用六君加香附山梔若咽酸或食後口酸當節飲食病作時大熱躁渴以薑湯乘熱飲之此截瘧之良法也每見發時飲啖生冷物者病或少愈多致脾虛胃損往往不治大抵內傷飲食者必惡食外感風寒者不惡食審系勞傷元氣雖有百症但用補中益氣湯其病自愈其屬外感者主以補養佐以解散其邪自退若外邪既退即補中益氣以實其表若邪去而不實其表或過用發表虧損脾胃皆致綿延難治凡此不問陰陽日夜所發皆宜補中益氣此不截之截也夫人以脾胃為主未有脾胃實而患瘧痢者若專主發表攻裡降火導痰是治其末而忘其本前所云乃瘧之大略如不應當分六經表裡而治之說見各方大尹曹時用患瘧寒熱用止截之劑反發熱惡寒飲食少思神思甚倦其脈或浮洪或微細此陽氣虛寒余用補中益氣內參耆歸術各加三錢甘草一錢五分加炮薑附子各一錢一劑而寒熱止數劑而元氣復一儒者秋患寒熱至春未愈胸痞腹脹余用人參二兩生薑二兩煨熟煎頓服寒熱即止更以調中益氣加半夏茯苓炮姜數劑元氣頓復後任縣尹每飲食勞倦疾作服前藥即愈大凡久瘧乃屬元氣虛蓋氣虛則寒血虛則熱胃虛則惡寒脾虛則發熱陰火下流則寒熱交作或吐涎不食泄瀉腹痛手足逆冷寒戰如慄若誤投以清脾截瘧二飲多致不起一上舍每至夏秋非停食作瀉必瘧痢霍亂遇勞吐痰頭眩體倦發熱惡寒用四物二陳芩連枳實山梔之類患瘧服止截之藥前症益甚時或遍身如芒刺然余以補中益氣加茯苓半夏內參耆各用三錢歸術各二錢十餘劑少愈若間斷其藥諸病仍至連服三十餘劑全愈又服還少丹半載形體充實一婦人瘧久不愈發後口乾倦甚用七味白朮散加麥門五味作大劑煎與恣飲再發稍可乃用補中益氣加茯苓半夏十餘劑而愈凡截瘧余常以參術各一兩生薑四兩煨熟煎服即止或以大劑補中益氣加煨姜尤效生薑一味亦效東洞庭馬志卿瘧後形體骨立發熱惡寒食少體倦用補中益氣內參耆歸術各加三錢甘草一錢五分炮姜二錢一劑而寒熱止數劑而元氣復一婦人久患寒熱服清脾飲之類胸膈飽脹飲食減少余用調中益氣加茯苓半夏炮姜各一錢二劑而痊一婦人勞役停食患瘧或用消導止截飲食少思體瘦腹脹余以補中益氣倍用參耆歸朮甘草加茯苓半夏各一錢五分炮姜五錢一劑頓安又以前藥炮姜用一錢不數劑元氣復而痊愈產後瘧疾見女科撮要十一脾肺虧損咳嗽痰喘等症大參李北泉時吐痰涎內熱作渴肢體倦怠勞而足熱用清氣化痰益甚余曰此腎水泛而為痰法當補腎不信另進滾痰丸一服吐瀉不止飲食不入頭暈眼閉始信余用六君子湯數劑胃氣漸復卻用六味丸月餘諸症悉愈鴻臚蘇龍溪咳嗽氣喘鼻塞流涕余用參蘇飲一劑以散寒邪更用補中益氣湯以實腠理而愈後因勞怒仍作自用前飲益甚加黃連枳實腹脹不食小便短少服二陳四苓前症愈劇小便不通余曰腹脹不食脾胃虛也小便短少肺腎虛也悉因攻伐所致投以六君加黃耆炮薑五味二劑諸症頓退再用補中益氣加炮薑五味數劑痊愈地官李北川每勞咳嗽余用補中益氣湯即愈一日復作自用參蘇飲益甚更服人參敗毒散項強口噤腰背反張余曰此誤汗亡津液而變痙矣仍以前湯加附子一錢四劑而痊感冒咳嗽若誤行發汗過多喘促呼吸不利吐痰不止必患肺癰矣待御譚希曾咳嗽吐痰手足時冷余以為脾肺虛寒用補中益氣加炮姜而愈職坊王用之喘嗽作渴面赤鼻乾余以為脾肺有熱用二陳加芩連山梔桔梗麥門而愈僉憲阮君聘咳嗽面白鼻流清涕此脾肺虛而兼外邪用補中益氣加茯苓半夏五味治之而愈又用六君芎歸之類而安司廳陳國華素陰虛患咳嗽以自知醫用發表化痰之劑不應用清熱化痰等藥其症愈甚余曰此脾肺虛也不信用牛黃清心丸更加胸腹作脹飲食少思足三陰虛症悉見朝用六君桔梗升麻麥門五味補脾土以生肺金夕用八味丸補命門火以生脾土諸症漸愈經云不能治其虛安問其餘此脾土虛不能生肺金而金病復用前藥而反瀉其火吾不得而知也中書鮑希伏素陰虛患咳嗽服清氣化痰丸及二陳芩連之類痰益甚用四物黃柏知母玄參之類腹脹咽啞右關脈浮弦左尺脈洪大余曰脾土既不能生肺金陰火又從而克之當滋化源朝用補中益氣加山茱麥門五味夕用六味地黃加五味子三月餘喜其慎疾得愈武選汪用之飲食起居失宜咳嗽吐痰用化痰發散之藥時仲夏脈洪數而無力胸滿面赤吐痰腥臭汗出不止余曰水泛為痰之症而用前劑是謂重亡津液得非肺癰乎不信仍服前藥翌日果吐膿脈數左三右寸為甚始信用桔梗湯一劑膿數頓止再劑全止面色頓白仍於憂惶余曰此症面白脈澀不治自愈又用前藥一劑佐以六味丸治之而痊錦衣李大用素不慎起居吐痰自汗咳嗽發熱服二陳芩連枳殼山梔之類前症不減飲食少思用四物二陳芩連黃柏知母玄參之類前症愈甚更加胸腹不利飲食益少內熱晡熱加桑皮紫蘇杏仁紫菀桔梗之類胸膈膨脹小便短少用豬苓澤瀉白朮茯苓枳殼青皮半夏黃連蘇子胸膈痞滿脅肋膨脹小便不通加茵陳葶藶喘促不臥飲食不進余診之六脈洪數肺腎二部尤甚余曰脾土既不能生肺金而心火又乘之此肺癰之作也當滋化源緩則不救不信後唾膿痰復求治余曰胸膈痞滿脾土敗也喘促不臥肺金敗也小便不通腎水敗也脅肋膨脹肝木敗也飲食不化心火敗也此化源既絕五臟已敗然藥豈能生耶已而果然絲客姚荃者素鬱怒年近六十脾胃不健服香燥行氣飲食少思兩脅脹悶服行氣破血飲食不入右脅脹痛喜用手按彼疑為膈氣痰飲內傷余曰乃肝木克脾土而脾土不能生肺金也若內有瘀血雖單衣亦不敢著肉用滋化源之藥四劑諸症頓退彼以為愈余曰火令在邇當補脾土以保肺金彼不信後復作另用痰火之劑益甚求治左關右寸滑數此肺內潰矣仍不信乃服前藥果吐穢膿而歿學士吳北川過飲痰塞舌本強硬服降火化痰藥痰氣益甚肢體不遂余作脾虛濕熱治之而愈上舍史瞻之每至春咳嗽用參蘇飲加芩連桑杏乃愈乙巳春患之用前藥益甚更加喉喑就治左尺洪數而無力余曰此是腎經陰火刑剋肺金當滋化源遂以六味丸料加麥門五味炒梔及補中益氣湯而愈儒者張克明咳嗽用二陳芩連枳殼胸滿氣喘侵晨吐痰加蘇子杏仁口出痰涎口乾作渴余曰侵晨吐痰脾虛不能消化飲食胸滿氣喘脾虛不能生肺金涎沫自出脾虛不能收攝口乾作渴脾虛不能生津液遂用六君加炮薑肉果溫補脾胃更用八味丸以補土母而愈一男子夏月吐痰或嗽用胃火藥不應余以為火乘肺金用麥門冬湯而愈後因勞復嗽用補中益氣加桔梗山梔片芩麥門五味而愈但口乾體倦小便赤澀日用生脈散而痊若咳而屬胃火有痰宜竹葉石膏湯胃氣虛宜補中益氣加貝母桔梗若陰火上衝宜生脈散送地黃丸以保肺氣生腎水此乃真臟之患非滋化源決不能愈一婦人患咳嗽脅痛發熱日晡益甚用加味逍遙散熟地治之而愈年餘因怒氣勞役而前症仍作又太陽痛或寒熱往來或咳嗽遺尿皆屬肝火血虛陰挺痿痹用前散及地黃丸月餘而瘥表弟婦咳嗽發熱嘔吐痰涎日夜約五六碗喘咳不寧胸瘞躁渴飲食不進崩血如湧此命門火衰脾土虛寒用八味丸及附子理中湯加減治之而愈詳見婦人血崩一婦人不得於姑患咳胸膈不利飲食無味此脾肺俱傷痰鬱於中先用歸脾湯加山梔撫芎貝母桔梗諸症漸愈後以六君加芎歸桔梗間服而愈一婦人咳嗽早間吐痰甚多夜間喘急不寐余謂早間痰乃脾虛飲食所化夜間喘急乃肺虛陰火上衝遂用補中益氣加麥門五味而愈一婦人飲食後因怒患瘧嘔吐用藿香正氣散二劑而愈後復怒吐痰甚多狂言熱熾胸脅脹痛手按少止脈洪大無倫按之微細此屬肝脾二經血虛以加味逍遙散加熟地川芎二劑脈症頓退再用十全大補而安此症若用疏通之劑是犯虛虛之戒矣上舍陳道復長子虧損腎經久患咳嗽午後益甚余曰當補脾土滋化源使金水自能相生時孟春不信乃服黃柏知母之類至夏吐痰引飲小便頻數面目如緋余以白朮當歸茯苓陳皮麥門五味丹皮澤瀉四劑乃以參耆熟地山茱為丸俾服之諸症頓退復請視余以為信遂用前藥如常與之彼仍泥不服卒致不起產後咳嗽見女科撮要十二各症方藥四物湯治肝脾腎血虛發熱或日晡熱甚頭目不清或煩躁不寐胸膈作脹或脅作痛宜用此湯若脾氣虛而不能生血宜用四君子湯若脾氣鬱而虛宜用歸脾湯若腎水涸而不能生肝血宜用六味丸當歸熟地黃各三錢芍藥二錢川芎一錢五分上水煎服加味四物湯即前方加白朮茯苓柴胡丹皮四君子湯治脾胃虛弱飲食少進或肢體腫脹肚腹作痛或大便不實體瘦面黃或胸膈虛痞痰嗽吞酸若因脾胃虛寒而致宜香砂六君子若因脾經鬱結而致宜歸脾湯若因肝木侮脾胃而致宜用六君加木香芍藥若命門火虛而致宜用八味丸人參白朮茯苓各二錢甘草炙一錢上薑棗水煎服異功散治久咳不已或腹滿少食或面腫氣逆又治脾胃虛弱飲食少思等症即前方加陳皮六君子湯即四君子加半夏陳皮治脾胃虛弱飲食少思或久患瘧痢若見內熱或飲食難化作酸乃屬虛火須加炮姜其功甚速香砂六君子湯即前方加香附藿香砂仁人參理中湯治脾胃虛弱飲食少思或去後無度或嘔吐腹痛或飲食難化胸膈不利或瘧疾中氣虛損久不能愈或中氣虛弱痰氣不利口舌生瘡加附子名附子理中湯治中氣虛寒而患前症又治入房腹痛手足逆冷或犯寒氣或食冷物人參白朮乾薑炮甘草炙各等分上每服五七錢或一兩水煎服附子理中湯治脾胃虛寒手足厥冷飲食不入或腸鳴切痛嘔逆吐瀉即前方加附子等分照前服八珍湯治氣血虛弱惡寒發熱煩躁作渴或不時寒熱眩暈昏憒或大便不實小便赤淋或飲食少思小腹脹痛等症即四物四君合方十全大補湯即八珍加黃耆肉桂治症同前又治遺精白濁自汗盜汗或內熱晡熱潮熱發熱或口乾作渴喉痛舌裂或胸乳膨脹脅肋作痛或臍腹陰冷便溺余滴或頭頸時痛眩暈目花或心神不寧寤而不寐或形容不充肢體作痛或鼻吸氣冷急趨氣促此皆是無根虛火但服此藥諸症悉退人參養榮湯治脾肺俱虛發熱惡寒四肢倦怠肌肉消瘦面黃短氣食少作瀉若氣血虛而變見諸症莫能名狀勿論其病勿論其脈但用此湯其病悉退白芍藥一錢五分人參陳皮黃耆蜜炙桂心當歸白朮甘草炙各一錢熟地黃五味子炒杵茯苓各七分半遠志五分上薑棗水煎服當歸補血湯治氣血俱虛肌熱惡寒面目赤色煩渴引飲脈洪大而虛重按似無此脈虛血虛也此病多有得於飢飽勞役者黃耆炙一兩當歸二錢酒製上水煎服當歸六黃湯當歸黃耆炒生地黃熟地黃各一錢黃芩黃連黃柏各炒焦五分上水煎服獨參湯治一切失血惡寒發熱作渴煩躁蓋血生於氣故血脫補氣陽生陰長之理也人參二兩上棗十枚水煎服歸脾湯治思慮傷脾不能攝血致血妄行或健忘怔忡驚悸盜汗或心脾作痛嗜臥少食大便不調或肢體重痛月經不調赤白帶下或思慮傷脾而患瘧痢人參白朮白茯苓黃耆龍眼肉酸棗仁各二錢遠志一錢木香甘草炙各五分當歸一錢上薑棗水煎服加味歸脾湯即前方加柴胡山梔加減八味丸治腎水不足虛火上炎發熱作渴口舌生瘡或牙齦潰爛咽喉作痛或形體憔悴寢汗發熱五臟齊損即六味丸加肉桂一兩六味丸一名地黃丸一名腎氣丸治腎經不足發熱作渴小便淋秘氣壅痰嗽頭目眩暈眼花耳聾咽燥舌痛齒牙不固腰腿痿軟自汗盜汗便血諸血失音水泛為痰血虛發熱等症其功不能盡述熟地黃八兩杵膏山茱萸肉乾山藥各四兩牡丹皮白茯苓澤瀉各三兩上各另為末和地黃加煉蜜丸桐子大每服七八十丸空心食前滾湯下八味丸治命門火衰不能生土以致脾胃虛寒飲食少思大便不實臍腹疼痛夜多漩溺等症即六味丸加肉桂附子各一兩余方見下卷
