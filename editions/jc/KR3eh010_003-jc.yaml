body:
  text: 卷下一脾腎虧損頭眩痰氣等症閣老梁厚齋氣短有痰小便赤澀足跟作痛尺脈浮大按之則澀此腎虛而痰飲也用四物送六味丸不月而康仲景先生云氣虛有飲用腎氣丸補而逐之誠開後學之蒙瞶濟無窮之夭枉腎氣丸即六味丸也都憲孟有涯氣短痰暈服辛香之劑痰盛遺尿兩尺浮大按之如無余以為腎家不能納氣歸源香燥致甚耳用八味丸料三劑而愈孫都憲形體豐厚勞神善怒面帶陽色口渴吐痰或頭目眩暈或熱從腹起左三脈洪而有力右三脈洪而無力余謂足三陰虧損用補中益氣加麥門五味及加減八味丸而愈若人少有老態不耐寒暑不勝勞役四時迭病皆因少時氣血方長而勞心虧損或精血未滿而御女過傷故其見症難以悉狀此精氣不足但滋化源其病自痊又若飲食勞役七情失宜以致諸症亦當治以前法設或六淫所侵而致諸症亦因真氣內虛而外邪乘襲尤當固胃氣為主蓋胃為五臟之根本故黃柏知母不宜輕用恐復傷胃氣也大凡雜症屬內因乃形氣病氣俱不足當補不當瀉傷寒雖屬外因亦宜分其表里虛實治當審之昌平守王天成頭暈惡寒形體倦怠得食稍愈勞而益甚寸關脈浮大此脾肺虛弱用補中益氣加蔓荊子而愈後因勞役發熱惡寒譫言不寐得食稍安用補中益氣湯而痊大尹祝支山因怒頭暈拗內筋攣時或寒熱日晡熱甚此肝火筋攣氣虛頭暈用八珍加柴胡山梔牡丹皮二十餘劑而愈上舍顧桐石會飲於周上舍節問余曰向孟有涯陳東谷俱為無嗣納寵已而得疾皆頭暈吐痰並用蘇合香丸惟有涯得生何也余曰二症因腎虛不能納氣而為頭暈不能制水而為痰涎東谷專主攻痰行氣有涯專於益火補氣故耳後余應杭人之請桐石房勞過度亦患前症或用清氣化痰愈甚顧曰我病是腎虛不能納氣歸源治者不悟而歿惜哉一男子素厚味胸滿痰盛余曰膏粱之人內多積熱與法制清氣化痰丸而愈彼為有驗修合饋送脾胃虛者無不受害先兄體貌豐偉唾痰甚多脈洪有力殊不耐勞遇風頭暈欲僕口舌破裂或至赤爛誤食姜蒜少許口瘡益甚服八味丸及補中益氣加附子錢許即愈停藥月餘諸症仍作此命門虛火不歸源也二肝腎虧損血燥結核等症儒者楊澤之性躁嗜色缺盆結一核此肝火血燥筋攣法當滋腎水生肝血不信乃內服降火化痰外敷南星商陸轉大如碗余用補中益氣及六味地黃間以蘆薈丸年餘元氣漸復而腫消一男子素善怒左項微腫漸大如升用清痰理氣而大熱作渴小便頻濁余謂腎水虧損用六味地黃補中益氣而愈亦有胸脅等處大如升斗或破而如菌如榴不問大小俱治以前法一男子頸間結核大潰年餘一男子眉間一核初如豆粒二年漸大如桃悉用清肝火養肝血益元氣而愈舉人江節夫頸臂脅肋各結一核恪服祛痰降火軟堅之劑益甚余曰此肝膽經血少而火燥也彼執前藥至明年六月各核皆潰脈浮大而澀余斷以秋金將旺肝木被克必不起後果然三脾腎虧損小便不利肚腹膨脹等症大尹劉天錫內有濕熱大便滑利小便澀滯服淡滲之劑愈加滴瀝小腹腿膝皆腫兩眼脹痛此腎虛熱在下焦淡滲導損陽氣陰無以化遂用地黃滋腎二丸小便如故更以補中益氣加麥門五味兼服而愈州守王用之先因肚腹膨脹飲食少思服二陳枳實之類小便不利大便不實咳痰腹脹用淡滲破氣之劑手足俱冷此足三陰虛寒之症也用金匱腎氣丸不月而康州同劉禹功素不慎起居七情以致飲食不甘胸膈不利用消導順氣肚腹痞滿吐痰氣逆用化痰降火食少泄瀉小便作脹用分利降火小便澀滯氣喘痰湧服清氣化痰丸小便愈澀大便愈瀉肚腹脹大肚臍突出不能寢臥六脈微細左寸虛甚右寸短促此命門火衰脾腎虛寒之危症也先用金匱加減腎氣丸料肉桂附各一錢五分二劑下瘀穢甚多又以補中益氣送二神丸二劑諸症悉退五六又用前藥數劑並附子之類貼腰臍及湧泉穴寸脈漸復而安後因怒腹悶惑於人言服沉香化氣丸大便下血諸症悉至余曰此陰絡傷也辭不治果歿一富商飲食起居失宜大便乾結常服潤腸等丸後胸腹不利飲食不甘口乾體倦發熱吐痰服二陳黃連之類前症益甚小便滴瀝大便泄瀉腹脹少食服五苓瞿麥之類小便不通體腫喘嗽用金匱腎氣丸補中益氣湯而愈一儒者失於調養飲食難化胸膈不利或用行氣消導藥咳嗽喘促服行氣化痰藥肚腹漸脹服行氣分利藥睡臥不能兩足浮腫小便不利大便不實脈浮大按之微細兩寸皆短此脾腎虧損朝用補中益氣加薑附夕用金匱腎氣加骨脂肉果各數劑諸症漸愈再佐以八味丸兩月乃能步履卻服補中八味半載而康一男子素不善調攝唾痰口乾飲食不美服化痰行氣之劑胸滿腹脹痰涎愈盛服導痰理脾之劑肚腹膨脹二便不利服分氣利水之劑腹大脅痛睡臥不得服破血消導之劑兩足皆腫脈浮大不及於寸口朝用金匱加減腎氣丸夕用補中益氣湯煎送前丸月餘諸症漸退飲食漸進再用八味丸補中湯月餘自能轉側又兩月而能步履卻服大補湯還少丹又半載而康後稍失調理其腹仍脹服前藥即愈一男子患前症余為壯火補土漸愈彼欲速服攻積之劑下血甚多余診之曰此陰絡傷故血內溢非所宜也後果歿一男子胸膈痞悶專服破氣之藥余曰此血虛之病也血生於脾土若服前藥脾氣弱而血愈虛矣不信又用內傷之藥反吐血余曰此陽絡傷也後果然大方世家湖鄉離群索居山妻趙氏忽嬰痰熱治者多以寒涼偶得小愈三四年餘屢進屢退於是元氣消爍庚子夏遍身浮腫手足麻冷日夜咳嗽煩躁引飲小水不利大肉盡去勢將危殆幸遇先生診之脈洪大而無倫按之如無此虛熱無火法當壯火之源以生脾土與金匱腎氣丸料服之頓覺小水潰決如泉俾日服前丸及大補之藥二十餘劑而愈三四年間平康無恙迄今甲辰仲春悲哀動中前症復作體如焚燎口肉盡腐胸腹腫滿食不下咽者四日夫婦相顧束手待斃而已又承先生視之投以八味丸二服神思清爽服金匱腎氣丸料加參耆歸術未竟夕而胸次漸舒陟然思食不三日而病去五六矣嗣後日用前二丸間服逾月而起至秋初復患痢又服金匱腎氣丸料加參耆歸朮黃連吳茱木香痢遂止但覺後重又用補中益氣加木香黃連吳茱五味數劑而愈大方自分寒素命亦蹇剝山妻抱病沉痼本難調攝苟非先生援救填壑未免今不肖奔走衣食於外而可無內顧之憂矣然則先生之仁庇固不肖全家之福亦不消全家之感也斯言也當置之座右以為子孫世誦之不肖嘗待先生之側檢閱醫案始知山妻奏效巔末遂秉書紀二丸藥之聖且彰先生用藥之神萬一云吳門晚學生沈大方履文再拜頓首謹書四脾胃虧損暑濕所傷等症附食生冷入房大司徒李蒲汀南吏部少宰時患黃疸當用淡滲之劑公尚無嗣猶豫不決余曰有是病而用是藥以茵陳五苓散加芩連山梔二劑而愈至辛卯得子公執余手而笑曰醫方猶公案也設君避譭譽殘喘安得享餘年而遂付託之望哉由是禮遇益厚應天王治中遍身發黃妄言如狂苦於胸痛手不可近此中焦蓄血為患用桃仁承氣湯一劑下瘀血而愈太守朱陽山弟下部蓄血發狂用抵當湯而愈一儒者每春夏口乾發熱勞則頭痛服清涼化痰藥瀉喘煩躁用香薷飲神思昏憒脈大而虛此因閉藏之際不遠幃幕為患名曰注夏用補中益氣去柴胡升麻加五味麥門炮姜一劑脈益甚仍用前藥加肉桂五分服之即蘇更用六味丸而痊一儒者體肥善飲仲秋痰喘用二陳芩連益甚加桑皮杏仁盜汗氣促加貝母枳殼不時發熱余以為脾肺虛寒用八味丸以補土母補中益氣以接中氣而愈一男子夏月入房食冰果腹痛余用附子理中湯而愈有同患此者不信別用二陳芩連之類而死一男子盛暑發熱胸背作痛飲湯自汗用發表之藥昏憒譫語大便不實吐痰甚多用十全大補一劑頓退又用補中益氣加炮姜二劑痊愈五肝脾腎虧損頭目耳鼻等症給事張禹功目赤不明服祛風散熱藥反畏明重聽脈大而虛此因勞心過度飲食失節以補中益氣加茯神棗仁山藥山茱五味頓愈又勞役復甚用十全大補兼以前藥漸愈卻用補中益氣加前藥而痊東垣云諸經脈絡皆走於面而行空竅其清氣散於目而為精走於耳而為聽若心煩事冗飲食失節脾胃虧損心火太盛百脈沸騰邪害孔竅而失明矣況脾為諸陰之首目為血脈之宗脾虛則五臟之精氣皆為失所若不理脾胃不養神血乃治標而不治本也少宰李蒲汀耳如蟬鳴服四物湯耳鳴益甚此元氣虧損之症五更服六味地黃丸食前服補中益氣湯頓愈此症若血虛而有火用八珍加山梔柴胡氣虛而有火四君加山梔柴胡若因怒就聾或鳴實用小柴胡加芎歸山梔虛用補中益氣加山梔午前甚用四物加白朮茯苓久須用補中益氣午後甚用地黃丸少司馬黎仰之南銀臺時因怒耳鳴吐痰作嘔不食寒熱脅痛用小柴胡合四物加山梔茯神陳皮而瘥尚寶劉毅齋怒則太陽作痛用小柴胡加茯苓山梔以清肝火更用六味丸以生腎水後不再發一儒者日晡兩目緊澀不能瞻視此元氣下陷用補中益氣倍加參耆數劑痊愈一男子亦患前症服黃柏知母之類更加便血此脾虛不能統血肝虛不能藏血也用補中益氣六味地黃而愈一儒者兩目作痛服降火祛風之藥兩目如緋熱倦殊甚余用十全大補湯數劑諸症悉退服補中益氣兼六味丸而愈復因勞役午後目澀體倦服十全大補而痊一男子房勞兼怒風府脹悶兩脅脹痛余作色欲損腎怒氣傷肝用六味地黃丸料加柴胡當歸一劑而安一儒者酒色過度頭腦兩脅作痛余以為腎虛而肝病亦用前藥頓安一男子面白鼻流清涕不聞馨穢三年矣用補中益氣加麥門山梔而愈一男子年二十素嗜酒色兩目赤痛或作或止兩尺洪大按之微弱余謂少年得此目當失明翌早索途而行不辨天日眾皆驚異余與六味地黃料加麥門五味一劑頓明婦人症見女科撮要六脾肺腎虧損小便自遺淋澀等症大司徒許函谷在南銀臺時因勞發熱小便自遺或時不利余作肝火陰挺不能約制午前用補中益氣加山藥黃柏知母午後服地黃丸月餘諸症悉退此症若服燥劑而頻數或不利用四物麥門五味甘草若數而黃用四物加山茱黃柏知母五味麥門若肺虛而短少用補中益氣加山藥麥門若陰挺痿痹而頻數用地黃丸若熱結膀胱而不利用五淋散若脾肺燥不能化生用黃芩清肺飲若膀胱陰虛陽無以生而淋瀝用滋腎丸若膀胱陽虛陰無以化而淋澀用六味丸若轉筋小便不通或喘急欲死不問男女孕婦急用八味丸緩則不救若老人陰痿思色精不出而內敗小便道澀如淋用八味丸料加車前牛膝若老人精已竭而復耗之大小便道牽痛愈痛愈欲便愈便則愈痛亦治以前藥不應急加附子若喘嗽吐痰腿足冷腫腰骨大痛面目浮腫太陽作痛亦治以前藥若痛愈而小便仍澀宜用加減八味丸以緩治之詳見褚氏遺書精血篇但無治法耳司徒邊華泉小便頻數澀滯短赤口乾唾痰此腎經陽虛熱燥陰無以化用六味滋腎二丸而愈司馬李梧山莖中作痛小便如淋口乾唾痰此思色精降而內敗用補中益氣六味地黃而愈考功楊村庵口舌乾燥小便頻數此膀胱陽燥陰虛先用滋腎丸以補陰而小便愈再用補中益氣六味地黃以補肺腎而安若汗多而小便短少或體不禁寒乃脾肺氣虛也司空何燕泉小便赤短體倦食少缺盆作痛此脾肺虛弱不能生腎水當滋化源用補中益氣六味丸加五味而安商主客素膏粱小便赤數口乾作渴吐痰稠黏右寸關數而有力此脾肺積熱遺於膀胱用黃芩清肺飲調理脾肺用滋腎六味二丸滋補腎水而愈一儒者發熱無時飲水不絕每登廁小便澀痛大便牽痛此精竭復耗所致用六味丸加五味子及補中益氣喜其謹守得愈若肢體畏寒喜熱飲食用八味丸儒者楊文魁痢後兩足浮腫胸腹脹滿小便短少用分利之劑遍身腫兼氣喘余曰兩足浮腫脾氣下陷也胸腹脹滿脾虛作痞也小便短少肺不能生腎也身腫氣喘脾不能生肺也用補中益氣湯加附子而愈半載後因飲食勞倦兩目浮腫小便短少仍服前藥頓愈甲戌年七月余奉侍武廟湯藥勞役過甚飲食失節復兼怒氣次年春莖中作癢時出白津時或痛甚急以手緊捻才止此肝脾之氣虛也服地黃丸及補中益氣加黃柏柴胡山梔茯苓木通而愈至丁酉九月又因勞役小便淋瀝莖癢竅痛仍服前湯加木通茯苓膽草澤瀉及地黃丸而愈大尹顧榮甫尾閭作癢小便赤澀左尺脈洪數屬腎經虛熱法當滋補彼不信乃服黃柏知母等藥年許高骨腫痛小便淋瀝肺腎二脈洪數無倫余曰子母俱敗無能為矣後果歿余甲辰仲夏在橫金陳白野第會其外舅顧同崖求余診脈左尺澀結右寸洪數余曰此肺金不能生腎水誠可慮果至季冬莖道澀痛如淋愈痛則愈欲便愈便則愈痛而歿七脾肺腎虧損虛勞怯弱等症庶吉士黃伯鄰發熱吐痰口乾體倦自用補中益氣湯不應余謂此金水俱虛之症兼服地黃丸而愈後背患一癤煩痛寒熱彼因前月嘗偕往視郭主政背疽郭不經意余決其殞於金旺之日果符余言已而郭氏妻孥感其毒皆患惡瘡伯鄰所患與郭患同甚恐余曰此小瘡也憎寒等症皆陰虛舊症果是瘡毒亦當補氣血余在第就以地黃丸料煎與服之即睡良久各症頓退自後常有頭面耳目口舌作痛或吐痰眩暈之類服前藥即愈後任都憲督鹽法道出於蘇必垂顧焉少司空何瀟用足熱口乾吐痰頭暈服四物黃連黃柏飲食即減痰熱益甚用十全大補加麥門五味山藥山茱而愈一儒者或兩足發熱或腳跟作痛用六味丸及四物加麥門五味玄參治之而愈後因勞役發熱惡寒作渴煩躁用當歸補血湯而安儒者劉允功形體魁偉冬日飲水自喜壯實余曰此陰虛也不信一日口舌生瘡或用寒涼之劑肢體倦怠發熱惡寒余用六味地黃補中益氣而愈一男子腿內作痛用滲濕化痰藥痛連臀肉面赤吐痰腳跟發熱余曰乃腎虛陰火上炎當滋化源不信服黃柏知母之類而歿余甥居宏年十四而娶至二十形體豐厚發熱作渴面赤作脹或外為砭血內用降火肢體倦怠痰涎愈多脈洪數鼓指用六味丸及大補湯加麥門五味而痊余甥凌雲漢年十六庚子夏作渴發熱吐痰唇燥遍身生疥兩腿尤多色黯作癢日晡愈熾仲冬腿患瘡尺脈洪數余曰疥腎疳也瘡骨疽也皆腎經虛症針之膿出其氣氤氳余謂火旺之際必患瘵症遂用六味地黃十全大補不二旬諸症愈而瘵症具仍用前藥而愈抵冬娶妻至春其症復作父母憂之俾其外寢雖其年少謹疾亦服地黃丸數斤煎藥三百餘劑而愈其弟雲霄年十五壬寅夏見其面赤唇燥形體消瘦余曰子病將進矣癸卯冬復見之曰子病愈深矣至甲辰夏胃經部分有青色此木乘土也始求治先以六君加柴胡芍藥山梔蕪荑炒黑黃連數劑及四味肥兒六味地黃二丸及參苓白朮歸芍山梔麥門五味炙草三十餘劑肝火漸退更加膽草柴胡三十餘劑乃去芍加肉桂三十餘劑及加減八味丸元氣漸復而愈八脾肺腎虧損遺精吐血便血等症少宰汪涵齋頭暈白濁余用補中益氣加茯苓半夏愈而復患腰痛用山藥山茱五味萆薢遠志頓愈又因勞心盜汗白濁以歸脾湯加五味而愈後不時眩暈用八味丸全愈南銀臺許函谷因勞發熱作渴小便自遺或時閉澀余作肝火血虛陰挺不能約制午前用補中益氣加山藥山茱午後服地黃丸月餘諸症悉退司廳陳石鏡久患白濁發熱體倦用補中益氣加炮姜四劑白濁稍止再用六味地黃丸兼服諸症悉愈光祿柴黼庵因勞患赤白濁用濟生歸脾十全大補二湯間服而愈司廳張襝齋陰中腫痛時發寒熱若小腹作痛則莖出白津用小柴胡加山梔膽草茱萸芎歸而愈朱工部勞則遺精齒牙即痛用補中益氣加半夏茯苓芍藥並六味地黃丸漸愈更以十全大補加麥門五味而痊一男子白濁夢遺口乾作渴大便閉澀午後熱甚用補中益氣加芍藥玄參並加減八味丸而愈一男子莖中痛出白津小便秘時作癢用小柴胡加山梔澤瀉炒連木通膽草茯苓二劑頓愈又兼六味地黃丸而痊一男子發熱便血精滑一男子尿血發熱一男子發熱遺精或小便不禁俱屬腎經虧損用地黃丸益氣湯以滋化源並皆得愈一男子鰥居數年素勤苦勞則吐血發熱煩躁服犀角地黃湯氣高而喘前病益盛更遺精白濁形體倦怠飲食少思脈洪大舉按有力服十全大補加麥門五味山茱山藥而愈儒者楊啟元素勤苦吐血發痙不知人事余以為脾胃虛損用十全大補湯及加減八味丸而痊愈再用歸脾湯而血止一儒者因飲食勞役及惱怒眉發脫落余以為勞傷精血陰火上炎所致用補中益氣加麥門五味及六味地黃丸加五味眉發頓生如故一男子年二十巔毛脫盡用六味地黃丸不數日發生寸許兩月復舊吳江史萬湖云有男女偶合眉發脫落無藥調治至數月後復生一童子年十四發熱吐血余謂宜補中益氣以滋化源不信用寒涼降火愈甚始謂余曰童子未室何腎虛之有參耆補氣奚為用之余述丹溪先生云腎主閉藏肝主疏泄二臟俱有相火而其繫上屬於心心為君火為物所感則易動於心心動則相火翕然而隨雖不交會其精亦暗耗矣又精血篇云男子精未滿而御女以通其精則五臟有不滿之處異日有難狀之疾遂用補中益氣及地黃丸而瘥一男子咳嗽吐血熱渴痰盛盜汗遺精用地黃丸料加麥門五味治之而愈後因勞怒忽吐紫血塊先用花蕊石散又用獨參湯漸愈後勞則吐血一二口脾肺腎三脈皆洪數用補中益氣六味地黃而痊愈辛丑夏余在嘉興屠內翰第遇星士張東谷談命時出中庭吐血一二口云久有此症遇勞即作余意此勞傷肺氣其血必散視之果然與補中益氣加麥門五味山藥熟地茯神遠志服之而愈翌早請見云每服四物黃連山梔之類血益多而倦益甚今得公一匕吐血頓止神思如故何也余曰脾統血肺主氣此勞傷脾肺致血妄行故用前藥健脾肺之氣而噓血歸源耳後率其子以師余余曰管見已行於世矣子宜覽之九肝脾腎虧損下部瘡腫等症通府黃廷用飲食起居失宜兩足發熱口乾吐痰自用二陳四物益甚兩尺數而無力余曰此腎虛之症也不信仍服前藥足跟熱癢以為瘡毒又服導濕之劑赤腫大熱外用敷藥破而出水久而不愈及用追毒丹瘡突如桃始信余言滋其化源半載得瘥儒者章立之左股作痛用清熱滲濕之藥色赤腫脹痛連腰脅腿足無力余以為足三陰虛用補中益氣六味地黃兩月餘元氣漸復諸症漸退喜其慎疾年許而痊府癢鍾之英兩腿生瘡色黯如錢似癬者三四癢痛相循膿水淋漓晡熱內熱口乾面黧此腎虛之症用加味六味丸數日而愈此等症候用祛風敗毒之劑以致誤人多矣一男子素遺精足跟作痛口乾作渴大便乾燥午後熱甚用補中益氣加芍藥玄參及六味丸而愈餘症見外科樞要十脾肺腎虧損大便秘結等症一儒者大便素結服搜風順氣丸後胸膈不利飲食善消面帶陽色左關尺脈洪而虛余曰此足三陰虛也彼恃知醫不信乃服潤腸丸大便不實肢體倦怠余與補中益氣六味地黃湯月餘而驗年許而安若脾肺氣虛者用補中益氣湯若脾經鬱結者用加味歸脾湯若氣血虛者用八珍湯加肉蓯蓉若脾經津液涸者用六味丸若發熱作渴飲冷者用竹葉黃耆湯若燥在直腸用豬膽汁導之若肝膽邪侮脾者用小柴胡加山梔郁李枳殼若膏粱厚味積熱者用加味清胃散亦有熱燥風燥陽結陰結者當審其因而治之若復傷胃氣多成敗症一老儒素有風熱飲食如常大便十七日不通肚腹不脹脈洪大而虛此陰火爍津液用六味丸二十餘劑至三十二日始欲去用豬膽潤而通利如常一婦人年七十有三痰喘內熱大便不通兩月不寐脈洪大重按微細此屬肝肺腎虧損朝用六味丸夕用逍遙散各三十餘劑計所進飲食百餘碗腹始痞悶乃以豬膽汁導而通之用十全大補調理而安若間前藥飲食不進諸症復作一男子年五十餘因怒少食大便不利服潤腸丸大便秘結胸脅作痛兼服脾約丸肝脾腎脈浮而澀余曰此足三陰精血虧損之症也東垣先生云若人胃強脾弱約束津液不得四布但輸膀胱小便數而大便難者用脾約丸若人陰血枯槁內火燔灼肺金受邪土受木傷脾肺失傳大便秘而小便數者用潤腸今滋其化源則大便自調矣如法果驗一儒者懷抱鬱結復因場屋不遂發熱作渴胸膈不利飲食少思服清熱化痰行氣等劑前症益甚肢體倦怠心脾二脈澀滯此鬱結傷脾之變症也遂用加味歸脾湯治之飲食漸進諸症漸退但大便尚澀兩顴赤色此肝腎虛火內傷陰血用八珍湯加蓯蓉麥門五味至三十餘劑大便自潤一男子所患同前不信余言服大黃等藥泄瀉便血遍身黑黯復求治余視之曰此陰陽二絡俱傷也經曰陽絡傷則血外溢陰絡傷則血內溢辭不治後果然職坊陳莪齋年逾六旬先因大便不通服內疏等劑後飲食少思胸腹作脹兩脅作痛形體倦怠兩尺浮大左關短澀右關弦澀時五月請治余意乃命火衰不能生脾土而肺金又克肝木憂其金旺之際不起後果然十一各症方藥小柴胡湯治肝膽症寒熱往來或日晡發熱或濕熱身熱默默不欲食或怒火口苦耳聾咳嗽發熱脅下作痛甚者轉側不便兩祛痞滿或泄瀉咳嗽或吐酸食苦水或因怒而患瘧痢等症柴胡二錢黃芩一錢五分人參半夏各七分甘草炙五分上姜水煎服加味小柴胡湯治血虛大勞大怒火動熱入血室或婦女經行感冒發熱寒熱如瘧夜間熱甚或譫語即前方加生地黃一錢黃芩半夏生薑湯治膽腑發咳嘔苦水如膽汁黃芩炒生薑各三錢甘草炙半夏各二錢上姜水煎服桔梗湯治心臟發咳咳而喉中如梗狀甚則咽腫喉痹苦梗三錢甘草六錢上水煎服芍藥甘草湯治小腸腑發咳咳而失氣芍藥甘草炙各四錢上水煎服升麻湯治脾臟發咳咳而右脅下痛痛引肩背甚則不可以動升麻白芍藥甘草各二錢葛根三錢上水煎服烏梅丸治胃腑發咳咳而嘔嘔甚則長蟲出烏梅三十個細辛附子桂枝人參黃柏各六錢乾薑一兩黃連一兩五錢當歸蜀椒各四兩上為末用酒浸烏梅一宿去核蒸之與米飯搗如泥丸桐子大每服三十丸白湯下麻黃湯治肺臟發咳咳而喘急有聲甚則唾血麻黃三錢桂枝二錢甘草一錢杏仁二十個上水煎服赤石脂禹餘糧湯治大腸腑發咳咳而遺屎赤石脂禹餘糧各二兩並打碎上水煎服麻黃附子細辛湯治腎臟發咳咳則腰背相引而痛甚則咳涎又治寒邪犯齒致腦齒痛宜急用之緩則不救麻黃細辛各二錢附子一錢上水煎服茯苓甘草湯治膀胱腑發咳咳而遺溺茯苓二錢桂枝二錢半生薑五大片甘草炙一錢上水煎服異功散治久咳不已或腹痛少食而腫氣逆又治脾胃虛弱飲食少思等症人參茯苓白朮甘草陳皮各等分上每服三五錢薑棗水煎法制清氣化痰丸順氣快脾化痰消食半夏南星去皮尖白礬皂角切乾薑各四兩上先將白礬等三味用水五碗煎取水三碗卻入半夏二味浸二日再煮至半夏南星無白點為度曬乾陳皮青皮去穰紫蘇子炒蘿蔔子炒另研杏仁去皮尖炒研葛根神麯炒麥糵炒山楂子香附子各二兩上為末蒸餅丸梧子大每服五七十丸臨臥食後茶湯下升陽益胃湯治脾胃