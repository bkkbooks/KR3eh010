錢夏生冬炒黃芩酒製冬去之熱甚用上每服三錢水煎時時服助陽活血湯治眼睫無力常欲垂閉余治同上黃耆甘草炙防風當歸各五分白芷蔓荊子各四分升麻七分上水煎食後熱服益陰腎氣丸治症同上熟地黃三兩當歸酒洗柴胡五味子乾山藥山茱萸去核各半兩茯苓澤瀉各二錢半生地黃酒炒四兩上為末煉蜜丸桐子大每服百丸茶湯下日三服連翹飲治目中溜火惡日與火癮澀小角緊久視昏花迎風有淚蔓荊子生甘草連翹各三錢柴胡五錢黃芩酒製五分生地黃當歸紅葵花人參各三錢黃耆五分升麻一錢防風羌活各二分上水煎服地芝丸治目不能遠視能近視或妨近視生地黃焙乾四兩天門冬去心枳殼麩炒真甘菊花各二兩上為末煉蜜丸桐子大每服百丸清茶或溫酒下定志丸治目不能近視反能遠視白茯苓人參各一兩遠志去心菖蒲各一兩上為末煉蜜丸桐子大以硃砂為衣每十丸至三十丸米飲食後下日三服大蘆薈丸一名九味蘆薈丸治大人小兒下疳潰爛或作痛又治肝疳食積口鼻生瘡牙齦蝕爛胡黃連黃連蘆薈木香白蕪荑炒青皮白雷丸鶴蝨草各一兩麝香三錢上為末蒸餅糊丸如麻子大每服一錢空心米飲下四味肥兒丸一名小肥兒丸治諸疳發熱目生雲翳口舌生瘡或牙齦腐爛肌肉消瘦遍身生瘡等症與地黃丸兼服黃連炒蕪荑炒神麯炒麥芽炒各等分上為末水糊丸桐子大每服二三十丸空心白湯下阿魏膏治一切痞塊更服胡連丸羌活獨活玄參官桂赤芍藥穿山甲生地黃兩頭尖大黃白芷天麻各五錢槐柳桃枝各二錢紅花四錢木鱉子二十枚去殼亂髮如雞子大一塊上用香油二斤四兩煎黑去渣入發煎發化乃去渣徐下黃丹煎軟硬得中入芒硝阿魏蘇合油乳香沒藥各五錢麝香三錢調勻即成膏矣攤貼患處內服丸藥黃丹須用真正者效凡貼膏藥先用朴硝隨患處鋪半指厚以紙蓋用熱熨斗熨良久如硝耗再加熨之二時許方貼膏藥若是肝積加蘆薈末同熨桃仁承氣湯治血結胸中手足不可近或中焦蓄血寒熱胸滿漱水不欲咽善忘昏迷其人如狂桃仁半兩大黃一兩甘草二錢桂三錢芒硝三錢上每服一兩薑水煎抵當湯治下部蓄血腹內作痛手不可近或發狂少腹滿硬小便自利大便反黑如狂者在中發狂者在下也大黃水蛭炒各半兩虻蟲去翅足桃仁各三錢上每服五錢水煎服如作丸煉蜜和之花蕊石散硫黃上色明淨者四兩花蕊石一兩上各為末拌勻先用紙筋和鹽泥瓦罐一個泥干入藥仍用泥封口候乾用炭周疊煅赤罐冷取出為細末每服一錢童便酒下搜風順氣丸治痔漏風熱閉結車前子一兩五錢大麻子微炒大黃五錢半生半熟牛膝酒浸郁李仁菟絲子酒浸枳殼山藥各二錢上為末煉蜜丸桐子大每服三十丸白湯下五淋散治膀胱有熱水道不通淋澀不出或尿如豆汁或成砂石或如膏汁或熱怫便血赤茯苓一錢五分赤芍藥山梔各一錢當歸甘草各一錢二分上入燈芯水煎服加味逍遙散治肝脾血虛發熱或潮熱晡熱或自汗盜汗或頭痛目澀或怔忡不寧或頰赤口乾或月經不調肚腹作痛或小腹重墜水道澀痛或腫痛出膿內熱作渴等症當歸芍藥茯苓白朮炒柴胡各一錢牡丹皮山梔炒甘草炙各五分上水煎服逍遙散即前方去山梔牡丹皮還少丹治脾腎虛寒飲食少思發熱盜汗遺精白濁又治真氣虧損肌體瘦弱等症肉蓯蓉遠志去心茴香巴戟乾山藥枸杞子熟地黃石菖蒲山茱萸去核牛膝杜仲去皮薑製楮實子五味子白茯苓各一兩上各另為末和勻用棗肉百枚並煉蜜丸桐子大每服五七十丸空心溫酒或鹽湯下日三服交加散治食瘧神效肉豆蔻二個一生一煨草豆蔻二個一生一煨厚朴二錢半制用半生用甘草二錢半炙半生用生薑一兩煨五錢生五錢上姜水煎發日五更服仲景白虎加桂枝湯治溫瘧知母六錢甘草炙二錢石膏五錢桂枝一錢粳米一合上水煎服此太陽陽明經藥也柴胡桂薑湯治寒多微有熱或但寒不熱名曰牝瘧桂枝黃芩牡蠣甘草炙乾薑各一錢栝蔞根柴胡各二錢上水煎服汗出即愈此少陽經藥也桂枝羌活湯治瘧處暑以前發頭項痛脈浮惡風有汗桂枝羌活防風甘草各一錢五分上水煎發而服如吐加半夏曲麻黃羌活湯治症如前但惡風而無汗麻黃去節羌活防風甘草各半兩上如前服加法同以上二方太陽經藥也白芷湯治瘧病身熱目痛熱多寒少脈長先以大柴胡下之餘熱不盡當服此藥白芷一兩知母一兩七錢石膏四兩上依前服此陽明經藥也桂枝芍藥湯治瘧寒熱大作不論先後此太陽陽明合病寒熱作則必戰慄經曰熱勝而動也發熱汗出不愈內熱也此湯主之桂枝五分黃耆知母石膏芍藥各二錢上水煎此太陽陽明經藥也桂枝黃芩湯如服前藥轉劇三陽合病也宜此和之柴胡一錢五分黃芩人參甘草各八分半夏石膏知母各五分桂枝二分上依前服如外邪已解而內邪未已從卯至午發者宜大柴胡下之從午至酉發者邪氣在內也宜大承氣下之從酉至子發者或至寅發者邪氣在血也桂枝石膏湯治瘧隔日發先寒後熱寒少熱多桂枝五錢黃芩一兩石膏知母各一兩五錢上水煎分三服此太陽陽明經藥也麻黃黃芩湯治瘧發如前而夜發者麻黃一兩去節甘草炙三錢桃仁三十個去皮尖黃芩五錢桂二錢上依前服桃仁味苦甘辛肝者血之海血驟則肝氣燥經所謂肝苦急急食甘以緩之故桃仁散血緩肝謂邪氣深遠而入血故夜發此湯散血中風寒乃三陰經藥也香連丸治痢疾並水瀉暑瀉甚效黃連淨二十兩吳茱萸去枝梗十兩上先將二味用熱水拌和入瓷器內置熱湯燉一日同炒至黃連紫黃色去茱用連為末四兩入木香末一兩淡醋米飲為丸桐子大每服二三十丸滾湯下久痢中氣下陷者用補中益氣下中氣虛者用四君子下中氣虛寒者加薑桂三黃丸治熱痢腹痛或口舌咽喉齒痛及一切實火症黃芩黃連黃柏各等分上各另為末水丸桐子大每服七八十丸白湯下芍藥湯治便血後重經曰溲而便膿血知氣行而血止也行血則便膿自愈調氣則後重自除芍藥一兩當歸黃連各半兩檳榔木香甘草炙各二錢桂二錢五分黃芩五錢上每服半兩水煎如痢不減加大黃加減濟生腎氣丸治脾腎虛腰重腳腫小便不利或肚腹腫脹四肢浮腫或喘急痰盛已成蠱疳其效如神白茯苓三兩附子半兩川牛膝肉桂去皮澤瀉車前子山茱萸山藥牡丹皮各一錢熟地黃四兩酒拌杵膏上為末加煉蜜丸桐子大每服七八十丸空心服白湯下三因當歸散治脾土不能制水水氣盈溢滲透經絡發為水腫木香赤茯苓當歸桂木通赤芍藥牡丹皮檳榔陳皮白朮各等分上每服五錢水煎服不換金正氣散治脾氣虛弱寒邪相搏痰停胸膈致發寒熱或作瘧疾厚朴去皮薑製藿香半夏薑製蒼朮米泔浸陳皮各一錢甘草炙五分上薑棗水煎服七味白朮散治中氣虧損津液短少口舌乾渴或口舌生瘡不喜飲冷或吐瀉後口乾最宜服人參白朮木香白茯苓甘草藿香各五分乾葛一錢上水煎服參苓白朮散治脾胃不和飲食少進或嘔吐泄瀉凡病後宜此調理人參茯苓白扁豆去皮薑汁拌炒白朮蓮肉去心皮砂仁炒薏苡仁炒桔梗炒山藥甘草炙各二兩上為末每服二三錢用石菖蒲湯下或作丸半夏湯治膽腑實熱精神恍惚寒熱泄瀉或寢寒憎風善太息半夏一錢五分黃芩一錢遠志一錢生地黃二錢秫米一合酸棗仁三錢炒宿姜一錢五分上長流水煎服犀角地黃丸治血虛火盛血妄行吐衄便下若因忿怒而致加山梔柴胡犀角鎊末生地黃白芍藥牡丹皮各一錢半上水煎傾出入犀角末服之人參平肺散治心火刑肺金患肺痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利人參四分青皮四分茯苓七分天門冬四分陳皮五分地骨皮五分甘草炙五分知母七分五味子十粒杵碎桑皮一錢上姜水煎服清涼飲治實熱便秘或喉中腫痛當歸赤芍藥甘草炙大黃蒸各等分上每服五錢水煎服清胃散治醇酒厚味唇齒作痛或齒齦潰爛或連頭面頸項作痛黃連炒一錢五分當歸生地黃牡丹皮各一錢升麻二錢上水煎服加味清胃散即前方加犀角連翹甘草涼膈散治實熱喉舌腫痛便溺秘結大黃朴硝甘草梔子仁黃芩薄荷葉各一兩連翹四兩上為末每服四五錢竹葉蜜少許煎服仍量加減潤腸丸治伏火風熱大腸乾燥若因失血或因腎不足當滋腎最忌此丸麻子仁桃仁去皮尖另研各一兩羌活當歸尾大黃煨皂角仁秦艽各五錢上另研為末煉蜜丸豬膽汁丸尤妙每服三十丸食前滾湯下若燥在直腸用豬膽汁導之亦忌前藥滋腎丸治熱在血分不渴而小便不利或腎虛足熱腿膝無力不能履地知母酒炒黃柏酒炒各二兩肉桂二錢上各另為末水丸桐子大每服二百丸空心白滾湯下黃芩清肺飲治肺熱小便不利宜用此藥清之黃芩一錢山梔二錢上水煎服不利加鹽豉二十粒清心蓮子飲治熱在氣分口乾作渴小便白濁夜安晝熱或口舌生瘡咽乾煩躁作渴小便赤淋黃芩炒麥門冬地骨皮車前子炒甘草各一錢半石蓮肉茯苓黃耆柴胡人參各一錢上每服五錢水煎服調中益氣湯治濕熱所傷體重煩悶口失滋味二便清數或痰嗽稠黏熱壅頭目體倦少食等症黃耆一錢人參去蘆甘草蒼朮各五分柴胡橘皮升麻木香各二分上水煎空心服三生飲治卒中昏憒不知人口眼喎斜半身不遂並痰厥氣厥南星一兩生用川烏去皮生用附子去皮生用各半兩木香二錢上每服五錢薑水煎秦艽升麻湯治風寒客手足陽明經口眼喎斜惡見風寒四肢拘急脈浮緊升麻乾葛甘草芍藥人參秦艽白芷防風桂枝各三錢上每服一兩蔥白二根水煎愈風丹治諸風肢體麻木手足不隨等症天麻牛膝同酒浸焙乾萆薢另研細玄參各六兩杜仲七兩羌活十四兩當歸熟地黃自制生地黃各一斤獨活五兩肉桂三兩上為末煉蜜丸桐子大常服五七十丸病大至百丸空心食前溫酒或白湯下地黃飲子治腎氣虛弱舌喑不能言足廢不能行熟地黃巴戟去心山茱萸去核肉蓯蓉酒浸焙附子炮五味子石斛白茯苓石菖蒲遠志去心官桂麥門冬去心各等分上每服三錢入薄荷少許薑棗水煎服余方見上卷
